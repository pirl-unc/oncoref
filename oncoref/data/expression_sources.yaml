    library_prep: polyA RNA-seq   # CoMMpass Illumina TruSeq stranded mRNA (polyA)
    expected_size_gb: 5
    citation: https://portal.gdc.cancer.gov/projects/MMRF-COMMPASS
    special_handling: >
      Inclusion: primary Bone Marrow CD138+ samples only
      (sample_type == 'Primary Blood Derived Cancer - Bone Marrow' AND
      sample_id endswith 'BM_CD138pos'); one deterministic sample per

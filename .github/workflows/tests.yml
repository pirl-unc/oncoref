name: Tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  minimal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify minimal base-layer contract
        run: |
          python - <<'PY'
          import importlib.util

          assert importlib.util.find_spec("pyensembl") is None

          import oncoref

          assert oncoref.canonical_gene_id("TP53") == "ENSG00000141510"
          assert oncoref.canonical_gene_id("NOT_A_REAL_GENE") is None
          assert not oncoref.cancer_tmb_df().empty
          assert not oncoref.cancer_type_registry().empty

          try:
              oncoref.genomes()
          except ImportError as exc:
              assert "oncoref[genome]" in str(exc)
          else:
              raise AssertionError("genome API should require the optional extra")
          PY

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check oncoref tests

      - name: Check formatting with ruff
        run: ruff format --check oncoref tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --cov=oncoref --cov-report=xml
